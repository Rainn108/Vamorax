  <script>history.replaceState(null,'','/shop')</script>
</head>
<body>
<div id="top-progress"></div>
<div class="page-ambient"><div class="ambient-orb ambient-orb-a"></div><div class="ambient-orb ambient-orb-b"></div></div>
<nav class="navbar">
  <a href="index.html" class="navbar-brand"><svg viewBox="0 0 100 100"><path d="M25 30 Q50 60 75 30"/><path d="M25 75 L25 60 Q35 58 50 75 Q65 58 75 60 L75 75"/></svg></a>
  <ul class="navbar-nav">
    <li><a href="index.html">Home</a></li><li><a href="shop.html" class="active">Shop</a></li>
    <li><a href="free-presets.html">Free</a></li><li><a href="tutorials.html">Tutorials</a></li><li><a href="contact.html">Contact</a></li>
  </ul>
  <div class="navbar-actions">
    <button class="icon-btn theme-toggle" onclick="window.toggleTheme()"></button>
    <a href="search.html" class="icon-btn"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></a>
    <button class="icon-btn cart-btn"><svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg><span class="cart-badge">0</span></button>
    <a href="login.html" class="btn btn-primary btn-sm nav-login-btn">Sign in</a>
    <div class="nav-user-menu hidden"><a href="dashboard.html" class="icon-btn"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></a></div>
  </div>
  <button class="hamburger" onclick="document.querySelector('.mobile-nav').classList.add('open')"><span></span><span></span><span></span></button>
</nav>
<div class="mobile-nav">
  <button class="mobile-nav-close"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
  <div class="mobile-nav-icons">
    <button class="mobile-nav-icon-btn cart-btn" title="Cart">
      <svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
      <span class="cart-badge">0</span>
    </button>
    <a href="login.html" class="mobile-nav-icon-btn nav-login-btn" title="Sign in">
      <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    </a>
    <div class="mobile-nav-icon-btn nav-user-menu hidden">
      <a href="dashboard.html" style="display:flex;align-items:center;justify-content:center;width:100%;height:100%">
        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </a>
    </div>
  </div>
  <a href="index.html">Home</a>
  <a href="shop.html">Shop</a>
  <a href="free-presets.html">Free Presets</a>
  <a href="tutorials.html">Tutorials</a>
  <a href="contact.html">Contact</a>
</div>
<div class="cart-overlay"></div>
<div class="cart-sidebar">
  <div class="cart-header"><span class="cart-title">Cart</span><button class="icon-btn cart-close"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
  <div class="cart-items"></div>
  <div class="cart-footer"><div class="cart-total"><span class="cart-total-label">Total</span><span class="cart-total-price">Rp 0</span></div><button class="btn btn-primary w-full cart-checkout-btn">Checkout</button></div>
</div>

<div class="page-content">
<div class="page-header">
  <span class="page-header-label">All presets</span>
  <h1 class="page-header-title fade-up">Browse presets</h1>
  <p class="page-header-sub">All presets Rp 5.000. Instant download after purchase.</p>
</div>

<section class="section" style="padding-top:0">
  <div class="container">
    <!-- Mobile dropdown filter -->
    <div class="filter-dropdown" id="shopFilterDropdown">
      <button class="filter-dropdown-btn" id="shopDropdownBtn">
        <span id="shopDropdownLabel">All</span>
        <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <div class="filter-dropdown-list">
        <button class="filter-dropdown-item active" data-filter="all">All</button>
        <button class="filter-dropdown-item" data-filter="cinematic">Cinematic</button>
        <button class="filter-dropdown-item" data-filter="velocity">Velocity</button>
        <button class="filter-dropdown-item" data-filter="beat-sync">Beat Sync</button>
        <button class="filter-dropdown-item" data-filter="free">Free</button>
      </div>
    </div>
    <!-- Desktop tab filter -->
    <div class="filter-tabs">
      <button class="filter-tab active" data-filter="all">All</button>
      <button class="filter-tab" data-filter="cinematic">Cinematic</button>
      <button class="filter-tab" data-filter="velocity">Velocity</button>
      <button class="filter-tab" data-filter="beat-sync">Beat Sync</button>
      <button class="filter-tab" data-filter="free">Free</button>
    </div>
    <div class="preset-grid" id="shopGrid"></div>
  </div>
</section>

<footer class="footer"><div class="footer-bottom"><span>© 2025 Vamorax</span><span>Made for creators</span></div></footer>
</div><!-- /page-content -->

<button class="live-chat-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg></button>
<div class="live-chat-window">
  <div class="live-chat-header"><span class="live-chat-header-title">Support</span><button class="icon-btn" onclick="document.querySelector('.live-chat-window').classList.remove('open')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
  <div class="live-chat-messages"><div class="chat-msg bot">Need help finding the right preset?</div></div>
  <div class="live-chat-quick"></div>
</div>

<script type="module">
  import { initTheme, toggleTheme, startProgress, doneProgress, initScrollReveal, initSmoothScroll, initMobileNav, initLiveChat } from './js/ui.js';
  import { initCartSidebar } from './js/cart.js';
  import { initShopPage, renderSkeletonCards } from './js/shop.js';
  import { updateNavAuth } from './js/auth.js';
  import { initNavPill } from './js/navbar.js';
  import { initPageTransition } from './js/transition.js';
  import { initWaveBackground } from './js/animations.js';
  window.toggleTheme = toggleTheme;
  initPageTransition();
  startProgress(); initTheme(); initScrollReveal(); initSmoothScroll(); initMobileNav();
  initCartSidebar(); initLiveChat(); updateNavAuth(); initNavPill();
  initWaveBackground();
  setTimeout(() => document.querySelectorAll('.fade-up').forEach(el => el.classList.add('visible')), 80);
  // Show skeletons immediately, then render real cards
  const shopGrid = document.getElementById('shopGrid');
  if (shopGrid) shopGrid.innerHTML = renderSkeletonCards(9);
  initShopPage();
  doneProgress();

  // Mobile dropdown wiring — syncs with desktop filter tabs
  const shopDropdown = document.getElementById('shopFilterDropdown');
  const shopDropdownBtn = document.getElementById('shopDropdownBtn');
  const shopDropdownLabel = document.getElementById('shopDropdownLabel');

  shopDropdownBtn?.addEventListener('click', () => shopDropdown.classList.toggle('open'));

  document.querySelectorAll('#shopFilterDropdown .filter-dropdown-item').forEach(item => {
    item.addEventListener('click', () => {
      document.querySelectorAll('#shopFilterDropdown .filter-dropdown-item').forEach(i => i.classList.remove('active'));
      item.classList.add('active');
      shopDropdownLabel.textContent = item.textContent;
      shopDropdown.classList.remove('open');
      // Trigger the matching desktop tab so renderGrid fires
      const tab = document.querySelector(`.filter-tab[data-filter="${item.dataset.filter}"]`);
      if (tab) tab.click();
    });
  });

  document.addEventListener('click', e => {
    if (shopDropdown && !shopDropdown.contains(e.target)) shopDropdown.classList.remove('open');
  });

  const params = new URLSearchParams(window.location.search);
  const f = params.get('filter');
  if (f) { const tab = document.querySelector(`.filter-tab[data-filter="${f}"]`); if (tab) tab.click(); }
</script>
</body>
</html>
