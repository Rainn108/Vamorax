<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" /><link rel="icon" type="image/png" href="logo Vm.png" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Receipt — Vamorax</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300..900;1,14..32,300..900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css" />
  <style>@media print { .navbar, .live-chat-btn, footer, .no-print { display:none!important; } }</style>
  <script>history.replaceState(null,'','/receipt')</script>
</head>
<body>
<div id="top-progress"></div>
<nav class="navbar no-print">
  <a href="index.html" class="navbar-brand"><svg viewBox="0 0 100 100"><path d="M25 30 Q50 60 75 30"/><path d="M25 75 L25 60 Q35 58 50 75 Q65 58 75 60 L75 75"/></svg></a>
  <div class="navbar-actions">
    <button class="icon-btn theme-toggle" onclick="window.toggleTheme()"></button>
    <a href="dashboard.html" class="btn btn-ghost btn-sm">Dashboard</a>
  </div>
</nav>

<div class="page-content">
<section class="section" style="padding-top:100px">
  <div class="receipt-wrap">
    <div style="margin-bottom:32px">
      <div style="display:inline-flex;align-items:center;gap:8px;padding:6px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);font-size:12px;color:var(--text-2);margin-bottom:20px">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
        Payment confirmed
      </div>
      <h1 style="font-size:28px;font-weight:700;letter-spacing:-1px;margin-bottom:8px">Order complete</h1>
      <p style="font-size:14px;color:var(--text-2)">Your presets are ready to download.</p>
    </div>

    <div class="receipt-card">
      <div class="receipt-row">
        <span class="receipt-row-label">Order ID</span>
        <span class="receipt-row-value receipt-order-id-val" style="font-family:monospace;font-size:12px">—</span>
      </div>
      <div class="receipt-row">
        <span class="receipt-row-label">Date</span>
        <span class="receipt-row-value receipt-date">—</span>
      </div>
      <div class="receipt-row">
        <span class="receipt-row-label">Payment</span>
        <span class="receipt-row-value receipt-payment-method">—</span>
      </div>
      <div class="receipt-row">
        <span class="receipt-row-label">Status</span>
        <span class="receipt-row-value receipt-status">—</span>
      </div>
      <div class="receipt-row" style="border-bottom:none;padding-top:16px">
        <span style="font-size:13px;font-weight:600">Total paid</span>
        <span style="font-size:20px;font-weight:700;letter-spacing:-0.5px" class="receipt-total">—</span>
      </div>
    </div>

    <div style="margin-top:24px">
      <div style="font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text-3);margin-bottom:16px">Downloads</div>
      <div class="receipt-download-list"></div>
    </div>

    <div style="display:flex;gap:8px;margin-top:32px;flex-wrap:wrap" class="no-print">
      <button class="btn btn-ghost" onclick="window.print()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        Print receipt
      </button>
      <a href="dashboard.html" class="btn btn-primary">Go to dashboard</a>
      <a href="shop.html" class="btn btn-ghost">Buy more</a>
    </div>
  </div>
</section>

<footer class="footer no-print"><div class="footer-bottom"><span>© 2025 Vamorax</span><span>Thank you</span></div></footer>
</div><!-- /page-content -->

<script type="module">
  import { initTheme, toggleTheme, startProgress, doneProgress, showToast } from './js/ui.js';
  import { initReceiptPage } from './js/checkout.js';
  import { updateNavAuth } from './js/auth.js';
  import { initPageTransition } from './js/transition.js';
  import { initWaveBackground } from './js/animations.js';
  window.toggleTheme = toggleTheme; window.showToast = showToast;
  initPageTransition();
  initWaveBackground();
  startProgress(); initTheme(); updateNavAuth(); initReceiptPage(); doneProgress();
</script>
</body>
</html>
